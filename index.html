<!DOCTYPE html>
  <head>

      <title>elrayaneyro</title>

    <meta name="google-site-verification" content="rELLrlU3w8sklwm1JmM_mFHnn2viADnnKxexgZQlLEI" />

    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/N35Q/elrayaneyro/refs/heads/main/LOGO.ico">

    <style>
      body {
        background-color: lightblue;
      }

      .goofy {
        border-style: solid;
        border-width: 5px;
        border-color: RGB(20, 255, 20);
        border-radius: 20px;
        margin: 10px;
        width: 200px;
        height: 40px;
        background-color: red;
        font-family: 'Bangers', serif7;
        font-size: 15px;
      }

      .oculto { display: none; }

      .visible { display: block; }

      .encabezado {
        background-color: blue;
        height: 200px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0px;
        margin-bottom: 30px;
      }

      .ragdoll {
        border-style: solid;
        border-width: 25px;
        border-color: red;
        border-radius: 20px;
        margin: 35px;
        display: flex;
        justify-content: center;
        align-content: center;
      }

      .poema {
        max-width: 600px;
        margin: auto;
        margin-bottom: 20px;
        padding: 20px;
        font-family: Georgia, serif;
        background-color: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .titulopoema {
        text-align: center;
        margin-bottom: 1em;
        cursor: not-allowed;
      }

      .poema p {
        white-space: pre-line;
        line-height: 1.6;
      }

      .poema .autor {
        text-align: right;
        margin-top: 1em;
        font-style: italic;
      }

      .poema .toggle-link {
        display: inline-block;
        margin-top: 10px;
        color: #007BFF;
        cursor: progress;
        text-decoration: underline;
        font-size: 0.95em;
      }

      .poema .explicacion {
        margin-top: 10px;
        font-size: 0.95em;
        color: #333;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <meta name="keywords" content="elrayaneyro, el rayaneyro, rayaneyro, raynero, rayanero, raianeyro, rayaneiro, raianeiro, rainero, rainiero, Rainiero, Rainiero López Vargas,  Rainiero Lopez Vargas">
  </head>
  <body>
    <audio id="myAudio">
      <source src="https://www.myinstants.com/media/sounds/goofy-ahh-sounds.mp3" type="audio/mpeg" preload:"auto">
    </audio>
    <div class="encabezado">
      <button class="goofy" style="position: relative; top: 5%; left: 0%; transform: translate(-145.5px, 0px);" onclick="document.getElementById('myAudio').play()">Click para obtener recompensa</button>
       <h1 style="margin-top: 10px; margin-bottom: 50px; color: red; font-family: 'Bangers', serif; text-align: center; height: 100px; font-size: 100px;">El rayaneyro</h1>
    </div>

    <div style="display: flex; justify-content: center;">
      <button class="goofy" onclick="document.getElementById('Insultos').classList.toggle('visible');">Prueba Insultos</button>
      <button class="goofy" onclick="document.getElementById('games').classList.toggle('visible');">Games</button>
      <!-- <button class="goofy" onclick="document.getElementById('B2').classList.toggle('visible');">Plantilla B2</button> -->
      <button class="goofy" onclick="document.getElementById('poemas').classList.toggle('visible');">Poemas</button>
      <button onclick="window.location.href='enigma.html';">Enigma</button>
    </div>

    <div class="oculto" id="Insultos">
      <iframe allow="fullscreen; autoplay;" allowfullscreen width="795" height="690" frameborder="0" src="https://es.educaplay.com/juego/22583170-desafio_de_insultos_andaluces.html"></iframe>
    </div>

    <div class="oculto" id="games">
      <div style="margin: 35px; position: relative; height: 402px;" onclick="{document.getElementById('myAudio').currentTime = 0; document.getElementById('myAudio').pause();}">
        <iframe onmouseover="document.getElementById('myAudio').play()" src="https://scratch.mit.edu/projects/975751909/embed" style="border-style: solid; border-width: 25px; border-color: RGB(20, 255, 20); border-radius: 20px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 485px; height: 402px;"></iframe>
      </div>

      <div class="ragdoll">
        <iframe style="width: 1600px; height: 900px;" src="https://bitlifeonline.github.io/ragdoll-archers/"></iframe>
      </div>

      <div class="ragdoll">
        <iframe style="width: 1600px; height: 900px;" src="https://freetoplayz.github.io/ragdoll-hit/"></iframe>
      </div>
    </div>

    <!--
    <div style="width: 1600px; height: 1000px;" class="oculto" id="B2">
      <iframe style="width: 1600px; height: 1000px;" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRmJ9hjsM67T9Sitp5Fx887XyazbO3J1BkVqabtnWryP7LjJ1j7yIGNKaRvFaqY3EGVMSOct4QcQECO/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
    -->

    <div class="oculto" id="poemas">
      <div id="contenedor-poemas"></div>
    </div>

    <script>
      var poemas = [
        {
          titulo: "Un soneto me manda hacer Violante",
          poema: `
            Un soneto me manda hacer Violante,
            que en mi vida me he visto en tal aprieto;
            catorce versos dicen que es soneto:
            burla burlando van los tres delante.

            Yo pensé que no hallara consonante,
            y estoy a la mitad de otro cuarteto;
            mas si me veo en el primer terceto,
            no hay cosa en los cuartetos que me espante.

            Por el primer terceto voy entrando,
            y parece que entré con pie derecho,
            pues fin con este verso le voy dando.

            Ya estoy en el segundo, y aun sospecho
            que estoy los trece versos acabando;
            contad si son catorce, y está hecho.`,
          autor: "— Lope de Vega",
          pregunta: "¿Por qué este poema?",
          porque: "Este poema es el primero que leí siendo algo consciente. Me mandaron a comentar o analizar un poema con 12 años y escogí este. Desde entonces, el soneto es mi estilo de poema favorito y al que accedo siempre como primera opción."
        },
        {
          titulo: "Oda nº1",
          poema: `
            En un ruidoso pasillo acabó
            lo que bonito estuvo siendo y era,
            lo que desde poco antes quisiera,
            lo que el pasado sábado empezó.

            Mi yo del pasado no lo soñó,
            mas en esta la nueva primavera
            y sin que ni yo mismo lo supiera,
            el viaje a Eastbourne a mí me cambió.

            Entendí que lo mío no es lo único
            y que enfocarse sin tener opciones
            puede llegar a hacerte ser un básico.

            Pero mi brillo asciende con mis sones.
            Olivares posee un brillo mágico
            y es el que une nuestros corazones.`,
          autor: "— Rainiero López Vargas 9/4/2025",
          pregunta: "¿Por qué este poema?",
          porque: "Esto lo hice a modo de oda al viaje que hice a Eastbourne. La simplicidad que posee para mi nivel en ese momento se debió a la falta de recursos tales como tiempo, internet para referencias o simplemente un diccionario. Esta carencia se debe a su vez al hecho de que lo escribí estando montado en el avión. Me hubiera dado tiempo a mejorarlo un poco, pero me mareé y lo dejé así."
        },
        {
          titulo: "Plan B",
          poema: `
            Con este título uno se espera
            que esto vaya de encontrar otra forma
            de conseguir lo que pasada norma
            no pudo, pero de otra manera.

            Nada se aleja más en esta era.
            Pues en buen punto de inflexión torna
            mi vida, que la anterior deforma;
            como la muerte a esta mera.

            Mucho de mi camino me he alejado.
            Pues no es el fin el que indica el camino,
            ni tampoco el camino atravesado.

            Es el camino, el que con hilo fino
            te mostrará hasta el que te ha guiado
            tu tejida historia en el camino


            Dejando estás cosas aparte
            y sin aún saber si tú quieres formar parte,
            te ofrezco conmigo llevarte a marte,
            para allí volverte a decir que eres una obra de arte

            Dicho esto frente al toro me alzo;
            Como buen nazareno: firme pero descalzo,
            y con confianza, como en un abrazo;
            aprovechando que aún estamos en marzo.

            Al final del día, cuando oscureció;
            tras horas y horas donde el sol le dió;
            en mitad de la noche azul se prendió
            una vela que el mundo entero iluminó.

            Pudiendo un bosque hacer arder en llamas,
            esa vela se reprime y aguanta hasta la siguiente mañana
            para asegurarse de que lo que ama
            podrá aguantar semejante flama.

            Pasión, dolor que la sangre me arranca.
            Cirios que me guían entre nieve y azahares
            a un corazón en el corazón de Olivares`,
          autor: "— Rainiero López Vargas 13/3/2026",
          pregunta: "¿Por qué este poema?",
          porque: "La importancia de este poema no es ni más ni menos que por ser el primero que he recitado a la persona a la que va dirigido. Lo escribí en clases de matemáticas y en mi casa. La primera parte, abstracta, parece una absurda explicación del título, pero refleja más que eso. la segunda es orientada al 100% al objetivo del poema: demostrar mi amor."
        }
        /*
        Para añadir poemas:
        en el último "}""
        se añade una ","
        y sería
        {
        titulo: "Título del poema",
        poema: `
          Verso uno
          verso 2
          
          verso 3`,
        autor: "— Nombre, fecha",
         pregunta: "¿Por qué este poema?",
         porque: "Explicación personal..."
        }
        */
      ];

      function toggleId(id) {
        document.getElementById(id).classList.toggle('visible');
      }

      var contenedor = document.getElementById('contenedor-poemas');
      for (var i = 0; i < poemas.length; i++) {
        var d = poemas[i];
        var cuerpoId = 'cuerpo-' + i;
        var expId = 'exp-' + i;
        var div = document.createElement('div');
        div.className = 'poema';
        div.innerHTML =
          '<span class="titulopoema" onclick="toggleId(\'' + cuerpoId + '\')">' + d.titulo + '</span>' +
          '<div class="oculto" id="' + cuerpoId + '">' +
            '<p>' + d.poema + '</p>' +
            '<p class="autor">' + d.autor + '</p>' +
            '<span class="toggle-link" onclick="toggleId(\'' + expId + '\')">' + d.pregunta + '</span>' +
            '<div class="explicacion oculto" id="' + expId + '">' + d.porque + '</div>' +
          '</div>';
        contenedor.appendChild(div);
      }
    </script>
  </body>
</html>
